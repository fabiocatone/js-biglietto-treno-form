<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-danger bg-gradient bg-opacity-75">

    <div class="container">
        <h1 class="text-light"> Calcola il prezzo del tuo biglietto</h1>
        <div class="bg-light rounded">
            
                <form class="row g-3 needs-validation bg-light
                my-2" novalidate>
                    <div class="col-md-4">
                        <label for="validationCustom01" class="form-label">Il tuo Nome e Cognome</label>
                        <input type="text" class="form-control" id="nameuser"  required>
                        <div class="valid-feedback">
                            Looks good!
                        </div>
                    </div>


                    <div class="col-md-6">
                        <label for="validationCustom03" class="form-label">Quanti km devi percorrere?</label>
                        <input type="text" class="form-control" id="kmuser" required>

                    </div>

                    <div class="col-md-3">
                        <label for="validationCustom05" class="form-label">Età</label>
                        <input type="text" class="form-control" id="ageuser" required>

                    </div>
                    
                    <div class="col-12 my-4">
                        <button id="submit" class="btn btn-primary" type="submit">Genera Biglietto</button>
                    </div>
                </form>
            
            
        </div>
<h1 class="mx-5 my-5 text-light"> Il Tuo biglietto</h1>

<div class="card" id="ticket">
    <div class="row ">
        <h1>Dettaglio passeggeri</h1>
    </div>
    <hr>
    <div class="row"> 
        <div class="col-3 bg-secondary-subtle">
            <h2>Nome passeggero</h2>
            <p id="ticket-name"></p>
        
        </div>
        <div class="col-2">
           <h3>Offerta</h3> 
           <p id="tariffa"> </p>
        </div>
         <div class="col-2">
           <h3>Carrozza</h3> 
           <p id="Carrozza"> </p>
        </div>
         <div class="col-2">
           <h3>Codice CP</h3> 
           <p id="Codice"> </p>
        </div>
         <div class="col-2">
           <h3>Costo biglietto</h3> 
           <p id="Costo"> </p>
        </div>
    </div>


</div>

            
    </div>










    <script src="./main.js"></script>
</body>

</html>
